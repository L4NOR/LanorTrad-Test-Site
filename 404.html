<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — LanorTrad</title>
  <meta name="description" content="Cette page n'existe pas (ou plus). Retournez à l'accueil ou explorez le catalogue LanorTrad.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0b0b16">
  <link rel="icon" href="images/icons/icon-192x192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/extras.css">
  <link rel="stylesheet" href="css/catalogue.css"><link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="loader"><div style="text-align:center"><div class="l-mark">Lanor<span class="grad-text">Trad</span></div><div class="l-bar"><i></i></div></div></div>
  <main>
    <section class="wrap" style="min-height:72vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 0">
      <div class="e404 grad-text" data-reveal style="font-family:var(--font-display);font-weight:800;font-size:clamp(5rem,22vw,12rem);line-height:.9;letter-spacing:-.03em">404</div>
      <h1 data-reveal data-delay="1" style="margin-top:8px">Cette page s'est perdue dans les Enfers de Tokyo…</h1>
      <p data-reveal data-delay="2" style="color:var(--txt-soft);max-width:48ch;margin:14px auto 0">
        Le lien est peut-être cassé ou la page a été déplacée. Pas de panique : tout est à un clic.
      </p>
      <div data-reveal data-delay="3" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:28px">
        <a href="index.html" class="btn btn-primary"><span>Retour à l'accueil</span></a>
        <a href="catalogue.html" class="btn btn-ghost">Explorer le catalogue</a>
        <button class="btn btn-ghost" id="btn-search" type="button">🔍 Rechercher</button>
      </div>
    </section>

    <section class="section" id="sugg-section" style="padding-top:0;display:none">
      <div class="wrap">
        <div class="section-head" data-reveal><div><span class="eyebrow">Pendant que vous êtes là</span><h2>À découvrir</h2></div></div>
        <div class="card-grid cards-row" id="sugg-grid" data-reveal data-delay="1"></div>
      </div>
    </section>
  </main>

  <script src="js/data/series.js"></script>
  <script src="js/data/chapters.js"></script>
  <script src="js/store.js"></script>
  <script src="js/palette.js"></script>
  <script src="js/core.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/tilt.js"></script>
  <script>
    document.addEventListener("lt:ready", () => {
      document.getElementById("btn-search").addEventListener("click", () => window.LT.openPalette());
      const pool = (window.SERIES || []).filter(s => s.featured);
      const pick = pool.sort(() => Math.random() - 0.5).slice(0, 4);
      if (pick.length) {
        document.getElementById("sugg-section").style.display = "";
        document.getElementById("sugg-grid").innerHTML = pick.map(LTcard).join("");
        document.dispatchEvent(new Event("lt:cards"));
        window.LT._scanReveals && window.LT._scanReveals();
      }
    });
  </script>
</body>
</html>
