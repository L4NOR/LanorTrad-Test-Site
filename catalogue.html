<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue — LanorTrad</title>
  <meta name="description" content="Parcourez tout le catalogue LanorTrad : mangas et oneshots traduits en français. Filtrez par genre, statut et popularité.">
  <meta name="theme-color" content="#0b0b16">
  <link rel="icon" href="images/icons/icon-192x192.png">
  <link rel="canonical" href="https://lanortrad.com/catalogue.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/extras.css">
  <link rel="stylesheet" href="css/catalogue.css">
</head>
<body>
  <div class="loader"><div style="text-align:center"><div class="l-mark">Lanor<span class="grad-text">Trad</span></div><div class="l-bar"><i></i></div></div></div>

  <main>
    <section class="wrap page-head" data-reveal>
      <span class="eyebrow">La bibliothèque complète</span>
      <h1>Catalogue</h1>
      <p>Toutes nos séries et oneshots, traduits avec soin. Utilisez les filtres pour trouver votre prochaine lecture.</p>
    </section>

    <div class="wrap">
      <div class="filters" data-reveal>
        <div class="f-search">
          <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg></span>
          <input type="search" id="f-search" placeholder="Rechercher une série…" autocomplete="off">
        </div>
        <div class="select"><select id="f-status">
          <option value="">Tous statuts</option>
          <option value="En cours">En cours</option>
          <option value="Terminé">Terminé</option>
        </select></div>
        <div class="select"><select id="f-type">
          <option value="">Tous types</option>
          <option value="manga">Manga</option>
          <option value="oneshot">Oneshot</option>
        </select></div>
        <div class="select"><select id="f-genre"></select></div>
        <div class="select"><select id="f-sort">
          <option value="recent">Plus récents</option>
          <option value="rating">Mieux notés</option>
          <option value="chapters">Plus de chapitres</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
        </select></div>
        <span class="f-count" id="f-count"></span>
      </div>

      <div class="card-grid" id="cat-grid"></div>
    </div>
  </main>

  <script src="js/data/series.js"></script>
  <script src="js/data/chapters.js"></script>
  <script src="js/store.js"></script>
  <script src="js/palette.js"></script>
  <script src="js/core.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/tilt.js"></script>
  <script src="js/catalogue.js"></script>
</body>
</html>
