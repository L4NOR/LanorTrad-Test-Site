# LanorTrad — configuration Netlify
[build]
  publish = "."
  # Régénère feed.xml (flux RSS des sorties) à partir de js/data/series.js
  command = "node scripts/build-feed.js"

# Fonctions serverless (validation des codes Premium)
[functions]
  directory = "netlify/functions"

# Sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Images de chapitres : cache long (immuables)
[[headers]]
  for = "/Manga/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Le service worker doit pouvoir se mettre à jour
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Flux RSS : cache court pour refléter vite les nouvelles sorties
[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"
    Cache-Control = "public, max-age=600"
