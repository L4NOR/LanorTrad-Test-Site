# LanorTrad — configuration Netlify
[build]
  publish = "."
  # Régénère feed.xml + sitemap.xml + og-meta.json à partir des données du site
  command = "node scripts/build-seo.js"

# Scan de secrets : SUPABASE_URL et la clé "publishable" sont PUBLIQUES par
# conception (utilisées dans le navigateur, protégées par les règles RLS), donc
# présentes volontairement dans js/supabase-config.js. On les exclut du scan
# pour éviter un faux positif, sans désactiver la détection des vrais secrets
# (service_role, VAPID privé, etc.).
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

# Fonctions serverless (validation des codes Premium)
[functions]
  directory = "netlify/functions"

# Edge function : injecte les balises OpenGraph par série sur la fiche manga
[[edge_functions]]
  path = "/manga.html"
  function = "og"

# Sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Images de chapitres : cache long (immuables)
[[headers]]
  for = "/Manga/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Le service worker doit pouvoir se mettre à jour
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Flux RSS : cache court pour refléter vite les nouvelles sorties
[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"
    Cache-Control = "public, max-age=600"

# Feuille de style du flux (affichage lisible du RSS dans un navigateur)
[[headers]]
  for = "/feed.xsl"
  [headers.values]
    Content-Type = "text/xsl; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# Sitemap : cache court
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
